<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog==" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>AhorrADAs</title>
  </head>
  <body>
    <header>
      <nav class="navbar has-background-primary" role="navigation" aria-label="main navigation">
        <div class="navbar-item">
          <button class="button is-large is-primary is-size-2 2.5rem"><i class="fas fa-wallet mr-2" aria-hidden="true"></i>AhorrADAs</button></div>
          <a
            role="button"
            class="navbar-burger"
            aria-label="menu"
            aria-expanded="false"
            data-target="navbarBasicExample">
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
          </a>
        </div>
          <div class="navbar-end">
            <div class="navbar-item">
              <div class="buttons">
                <a class="button is-primary">
                    <i class="fas fa-chart-line mr-2 __web-inspector-hide-shortcut__" aria-hidden="true"></i><strong>Balance</strong>
                </a>
                <a class="button is-primary">
                    <i class="fas fa-tag mr-2" aria-hidden="true"></i>
                    <strong>Categorías</strong>
                  </a>
                  <a class="button is-primary">
                    <i class="fas fa-chart-pie mr-2" aria-hidden="true"></i>
                    <strong>Reportes</strong>
                  </a>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>
    
    <section class="section mt-5 vista" id="balanceHome">
      <div class="container">
        <div class="columns">
          <div class="column is-3-widescreen is-4-desktop is-12-tablet is-offset-1-widescreen">
            <!-- Balance -->
            <div class="box">
              <h2 class="is-size-3 mb-4">Balance</h2>
              <div class="columns">  
                <div class="column is-size-5">Ganancias</div>
                <div class="column has-text-success has-text-right" id="ganancias">+$0</div>
              </div>
              <div class="columns">
                <div class="column is-size-5">Gastos</div>
                <div class="column has-text-right has-text-danger" id="gastos">-$0</div>
              </div>
              <div class="columns">
                <div class="column is-size-4">Total</div>
                <div class="column has-text-right has-text-weight-bold" id="balance">$0</div>
              </div>
              <div class="box">
                <div class="columns is-mobile is-vcentered">
                    <div class="column">
                      <h2 class="is-size-4 has-text-weight-bold mb-4">Filtros</h2>
                    </div>
                  <div class="column has-text-right">
                    <a href="#" id="toggle-filter">Ocultar Filtros</a>
                  </div>
                </div>
                <div id="filters">
                  <div>
                    <label class="label" for="filter-type">Tipo</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select id="filter-type">
                          <option value="all">Todos</option>
                          <option value="bills">Gastos</option>
                          <option value="profits">Ganancias</option>
                        </select>
                      </div>
                    </div>
                  </div>
                  <div>
                    <label class="label" for="filter-category">Categorías</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select id="filter-category">
                          <option value="">Comida</option>
                          <option value="">Educación</option>
                          <option value="">Salidas</option>
                          <option value="">Servicios</option>
                          <option value="">Trabajo</option>
                          <option value="">Transporte</option>
                        </select>
                      </div>
                    </div>
                  </div>
                  <div>
                    <label class="label" for="filter-date">Desde</label>
                    <div class="control">
                      <input type="date" id="filter-date" class="input">
                    </div>
                  </div>
                  <div>
                    <label class="label" for="filter-order">Ordenar Por</label>
                    <div class="control">
                      <div class="select">
                        <select id="filter-order">
                          <option value="" disabled selected></option>
                          <option value="more-recently">Más Reciente</option>
                          <option value="less-recently">Menos Reciente</option>
                          <option value="greater-amount">Mayor Monto</option>
                          <option value="lower-amount">Menor Monto</option>
                          <option value="A/Z">A/Z</option>
                          <option value="Z/A">Z/A</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="column"></div>
        <div class="columns"></div>
      </div>
      
    </section>

  </body>
  <script src="main.js" ></script>
</html>
