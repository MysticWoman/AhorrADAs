<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog==" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>AhorrADAs</title>
  </head>
  <body>
    <header>
      <nav class="navbar is-dark" role="navigation" aria-label="main navigation">
        <div class="navbar-item">
          <button class="button is-large is-primary is-size-2 2.5rem title is-2"><i class="fas fa-wallet mr-2" aria-hidden="true"></i>AhorrADAs</button></div>
        </div>
          <div class="navbar-end">
            <div class="navbar-item">
              <div class="buttons">
                <a class="button is-primary">
                    <i class="fas fa-chart-line mr-2 __web-inspector-hide-shortcut__" aria-hidden="true"></i><strong>Balance</strong>
                </a>
                <a class="button is-primary">
                    <i class="fas fa-tag mr-2" aria-hidden="true"></i>
                    <strong>Categorías</strong>
                  </a>
                  <a class="button is-primary">
                    <i class="fas fa-chart-pie mr-2" aria-hidden="true"></i>
                    <strong>Reportes</strong>
                  </a>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>
    
    <section class="columns is-mobile section mt-5 vista" id="balanceHome">
      <div class="container">
        <div class="columns">
          <div class="column is-6-widescreen is-4-desktop is-12-tablet is-offset-1-widescreen">
            <!-- Balance -->
            <div class="box">
              <h2 class="is-size-3 mb-4">Balance</h2>
              <div class="column">
                <div class="columns">
                  <div class="column is-size-5">Ganancias</div>
                  <div id="gainings" class="column has-text-success has-text-right">+$</div>
                </div>
                <div class="columns">
                  <div class="column is-size-5">Gastos</div>
                  <div id="expenses" class="column has-text-right has-text-danger">-$</div>
                </div>  
                <div class="columns">
                  <div class="column is-size-5">Total</div>
                  <div id="total" class="column has-text-weight-bold has-text-right">$</div>
                </div>
              </div>
              <div class="box">
                <div class="columns">
                  <div class="column">
                    <h2 class="is-size-4 has-text-weight-bold mb-4">Filtros</h2>
                  </div>
                  <div class="column has-text-right">
                    <a href="#" id="toggleFilter">Ocultar Filtros</a>
                  </div>  
                </div>
                <!-- filter -->
                <div id="filter">
                  <div>
                    <label class="label" for="filtro-tipo">Tipo</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select id="filtro-tipo">
                          <option value="todos">Todos</option>
                          <option value="gasto">Gastos</option>
                          <option value="ganancia">Ganancias</option>
                        </select>
                      </div>
                    </div>
                  </div>
                  <div>
                    <label class="label" for="filtro-categoria">Categorías</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select id="filtro-category">
                          <option value="" disabled selected></option>
		                      <option value="">Comida</option>
                          <option value="">Educación</option>
                          <option value="">Salidas</option>
                          <option value="">Servicios</option>
                          <option value="">Trabajo</option>
                          <option value="">Transporte</option>
			                  </select>
                      </div>
                    </div>
                  </div>
                  <div>
                    <label class="label" for="filtro-fecha">Desde</label>
                    <div class="control">
                      <input type="date" id="filtro-fecha" class="input">
                    </div>
                  </div>
                  <div>
                    <label class="label" for="filtro-orden">Ordenar Por</label>
                    <div class="control">
                      <div class="select">
                        <select id="filtro-orden">
		                      <option value="" disabled selected></option>
                          <option value="mas_reciente">Más Reciente</option>
                          <option value="menos_reciente">Menos Reciente</option>
                          <option value="mayor_monto">Mayor Monto</option>
                          <option value="menor_monto">Menor Monto</option>
                          <option value="A/Z">A/Z</option>
                          <option value="Z/A">Z/A</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div> 
    </div>
    <!-- operaciones -->
      <div class="column is-centered is-3-widescreen is-half">
        <div class="box">
          <div class="columns">
            <div class="column">
              <h3 class="is-size-4 has-text-weight-bold">Operaciones</h3>
            </div>

            <div class="column has-text-right-tablet">
              <button type="button" class="button is-primary" id="viewOperation">
                + Nueva operación
              </button>
            </div>  
          </div>

        <div class="my-6 py-6" id="sin-operaciones">
          <figure class="image">
            <img src="./Images/wallet.svg" class="" alt="">
          </figure>
          <h4 class="is-size-4 has-text-centered mt-6 mb-4 has-text-weight-semibold"> Sin resultados </h4>
          <p class="has-text-centered">Cambia los filtros o agrega operaciones </p>
        </div>  
      </div>
    </div>
    </section>

    <section class="section vista has-background-light is-hidden" id="sectionNewOperation">
      <div class="column">
        <div class="box">
          <h2>Nueva Operacion</h2>
          <form id="formNewOperation">
            <input type="text">
            <button type="button" class="button is-danger" id="viewHome">Cancelar</button>
            <button type="button" class="button is-success" id="viewHomeAcept">Aceptar</button>
          </form>
        </div>
      </div>
    </section>

  </body>
  <script src="main.js" ></script>
</html>
